name: Deploy to GitHub Pages

# main 브랜치에 push될 때마다 자동으로 GitHub Pages에 배포합니다.
on:
  push:
    branches: [main]
  workflow_dispatch:        # 액션 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지(연속 push 시 최신 것만)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
